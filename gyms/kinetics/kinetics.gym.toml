# A procedural gym (Phase 2 / brief §13, ADR-0049) — the kinetics tier's drill instrument. Like the calorimetry
# and weak-acid gyms it is BOTH model-exact-then-rounded (regime-2: the integrated rate law is exact inside the
# disclosed rate-law model, the answer rounded to 3 sig figs, the gate re-derives within tolerance) AND
# data-sourced (regime-3: the rate constant k comes from data/rate-constants.toml, OpenStax §12.4). Every answer
# is found the honest way — the SAME order-general `chemkernel.kinetics` engine the lessons use — and the Node
# gate re-derives it per order from the emitted k + [A]₀ + t. Three kinds: apply the order's integrated law to
# find [A](t); apply the order's half-life formula; and READ the order off the successive-half-life pattern
# (constant → 1st, doubling → 2nd, halving → 0th — the tier's payoff). The named diagnostics/distractors are all
# the same mistake: using the wrong order's formula.

