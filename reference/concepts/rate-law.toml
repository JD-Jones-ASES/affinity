# Chemical Atlas concept entry (ADR-0005, ADR-0049). Rate law: rate = k[A]^m[B]^n — the empirical model relating
# rate to concentration. The orders are MEASURED, not the coefficients. Model-exact. No [[array-of-tables]].
id = "rate-law"
kind = "concept"
title = "Rate law and reaction order"
term = "rate law"
regime = "model-exact"
definition = "A **rate law** relates the reaction rate to concentrations: $\\text{rate} = k[\\mathrm{A}]^m[\\mathrm{B}]^n$. The exponents are the **reaction orders** — the **overall order** is $m+n$ — and, crucially, they are found by **experiment**, *not* read off the balanced-equation coefficients (a common trap). The proportionality constant $k$ is the **rate constant** (a sourced, temperature-dependent datum). A **first-order** reaction, rate $= k[\\mathrm{A}]$, is the simplest: its concentration decays exponentially and its half-life is constant (see [[half-life]]). The rate law is a disclosed model — regime-2; $k$ is regime-3 — while the integrated form that follows from it is exact given the model."
latex = "\\text{rate} = k[\\mathrm{A}]^m[\\mathrm{B}]^n"
