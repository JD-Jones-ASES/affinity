# Chemical Atlas concept entry (ADR-0005, ADR-0048 3rd increment). The acid/base bridge: water ionizes itself a
# little, and its ion-product K_w ties [H⁺] and [OH⁻] together — so a base's [OH⁻] fixes its pH. Model-exact (the
# operational K_w rests on activity ≈ concentration; the value is the 25 °C datum). No [[array-of-tables]] / TOML
