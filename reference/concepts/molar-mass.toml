definition = "The mass of one mole of a substance, in g/mol — the sum of its atoms' standard atomic weights. It converts between mass and moles, $n = m/\\mathcal{M}$, so it turns a ledger amount into a mass on the balance. The arithmetic is exact; the atomic weights it sums are sourced data (CIAAW)."
