definition = "Atoms are neither created nor destroyed in a reaction, so once the equation is balanced every element's atom count is equal on both sides. This is the constraint the balancer solves and the atom-balance check enforces at build time; it is also why the ledger's coefficients $\\nu_i$ must come from a balanced equation. For each element $E$, the signed contributions of all species sum to zero."
