definition = "Choosing the smallest whole-number coefficients that make every element's atom count — and the total charge — equal on both sides. ChemKernel solves this as the null space of the conservation matrix: one exact integer vector, re-verified, so the coefficients are derived rather than guessed. For the calcium-phosphate lesson that gives $3\\,\\text{CaCl}_2 + 2\\,\\text{Na}_3\\text{PO}_4 \\rightarrow \\text{Ca}_3(\\text{PO}_4)_2 + 6\\,\\text{NaCl}$."
