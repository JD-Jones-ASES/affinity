id = "reaction-combustion"
kind = "reaction-family"
title = "Combustion"
family = "combustion"
general_form = "fuel (C, H) + O2 -> CO2 + H2O"
general_form_latex = "\\mathrm{fuel} + \\mathrm{O_{2}} \\rightarrow \\mathrm{CO_{2}} + \\mathrm{H_{2}O}"
summary = "A fuel made of carbon and hydrogen burns in oxygen. Complete combustion sends every carbon to carbon dioxide and every hydrogen to water. Because a free element (O2) becomes combined, combustion is always a redox reaction."
regime = "rule-sourced"
source = "openstax-chemistry-2e"
# related/lessons must precede the [[misconceptions]]/[[examples]] headers (TOML trap #4; producer fails loud).
related = [
  { to = "balancing-equations", type = "uses" },
  { to = "conservation-of-mass", type = "depends-on" },
]
lessons = []
conditions = [
  "Needs O2 as a reactant and enough of it — incomplete combustion (too little O2) also makes carbon monoxide or soot, which this complete-combustion form does not cover.",
  "The fuel here is a hydrocarbon (only C and H, optionally O); other fuels burn to other oxides.",
]

[[misconceptions]]
claim = "Combustion just makes a compound disappear into smoke."
refute = "Nothing disappears — every atom is conserved. Count them: the carbon leaves as CO2 and the hydrogen as H2O, both weighed in the balanced equation."

[[misconceptions]]
claim = "You can balance the oxygen by writing CO instead of CO2."
refute = "CO (carbon monoxide) is a different substance from CO2. Balance with coefficients out front, never by changing a formula's subscripts."

[[examples]]
reactants = ["CH4(g)", "O2(g)"]
products = ["CO2(g)", "H2O(g)"]

[[examples]]
reactants = ["C3H8(g)", "O2(g)"]
products = ["CO2(g)", "H2O(g)"]

[[examples]]
reactants = ["C2H6(g)", "O2(g)"]
products = ["CO2(g)", "H2O(g)"]
