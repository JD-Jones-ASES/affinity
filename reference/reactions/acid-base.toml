id = "reaction-acid-base"
kind = "reaction-family"
title = "Acid-base neutralization"
family = "acid-base"
general_form = "acid + base -> salt + water"
general_form_latex = "\\mathrm{acid} + \\mathrm{base} \\rightarrow \\mathrm{salt} + \\mathrm{H_{2}O}"
summary = "An acid supplies H+ and a base supplies OH-; the two combine into water, leaving the acid's anion and the base's cation together as a dissolved salt. Strip the spectators and every strong-acid + strong-base neutralization has the same net-ionic core: H+ + OH- -> water. No element goes free, so neutralization is not a redox reaction."
regime = "rule-sourced"
source = "openstax-chemistry-2e"
# related/lessons must precede the [[misconceptions]]/[[examples]] headers (TOML trap #4; producer fails loud).
related = [
  { to = "net-ionic-equation", type = "see-also" },
  { to = "spectator-ion", type = "see-also" },
  { to = "dissociation", type = "depends-on" },
]
lessons = ["hydrochloric-sodium-hydroxide"]
conditions = [
  "Needs a species that donates H+ (an acid) and one that donates OH- (a base).",
  "The strong-acid + strong-base examples here go essentially to completion; a weak acid or weak base only partly ionizes and the story is subtler.",
]

[[misconceptions]]
claim = "Neutralization always leaves a neutral (pH 7) solution."
refute = "Only when a strong acid exactly cancels a strong base. A leftover of either, or a weak partner, leaves the resulting salt solution slightly acidic or basic — 'neutralize' names the reaction, not a guaranteed pH 7."

[[misconceptions]]
claim = "The salt and water are brand-new atoms made in the reaction."
refute = "Every atom is conserved. The water's H and O come from the acid's H+ and the base's OH-; the salt's ions are the acid's anion and the base's cation, just re-paired."

[[examples]]
reactants = ["HCl(aq)", "NaOH(aq)"]
products = ["NaCl(aq)", "H2O(l)"]

[[examples]]
reactants = ["H2SO4(aq)", "NaOH(aq)"]
products = ["Na2SO4(aq)", "H2O(l)"]

[[examples]]
reactants = ["HNO3(aq)", "KOH(aq)"]
products = ["KNO3(aq)", "H2O(l)"]
