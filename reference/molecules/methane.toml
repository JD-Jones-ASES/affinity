kind = "molecule"
id = "molecule-methane"
title = "Methane"
formula = "CH4"
names = ["methane"]
central = "C1"
summary = "Eight valence electrons: four C–H bonding pairs, no lone pairs. Four electron domains and no lone pairs give a symmetric tetrahedron, bond angles 109.5°. The C–H bond is barely polar (ΔEN 0.35, on the nonpolar side of the guideline), and the four identical bonds point to the corners of a tetrahedron, so their small dipoles cancel — methane is nonpolar twice over: nearly nonpolar bonds arranged symmetrically."
source = "openstax-chemistry-2e"
polarity = "nonpolar"
polarity_reason = "Four identical C–H bonds point to the corners of a symmetric tetrahedron, so any bond dipoles cancel; the C–H bond is nearly nonpolar to begin with (ΔEN 0.35)."
lessons = ["boiling-points-and-imfs"]

