kind = "molecule"
id = "molecule-ammonia"
title = "Ammonia"
formula = "NH3"
names = ["ammonia"]
central = "N1"
summary = "Eight valence electrons: three N–H bonding pairs and one lone pair on nitrogen. Four electron domains make the electron geometry tetrahedral, but with one lone pair the molecular shape is trigonal pyramidal — a tripod with the lone pair on top. The pyramid is not symmetric top-to-bottom, so the three polar N–H dipoles plus the lone pair give a net dipole: ammonia is polar. Contrast the ammonium ion, where a fourth N–H bond replaces the lone pair and the shape becomes a symmetric tetrahedron."
source = "openstax-chemistry-2e"
polarity = "polar"
polarity_reason = "The molecule is trigonal pyramidal (not planar), so the three N–H bond dipoles and the lone pair do not cancel — a net dipole points through the nitrogen toward the lone pair."
lessons = ["boiling-points-and-imfs"]

