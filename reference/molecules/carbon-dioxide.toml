title = "Carbon dioxide"
formula = "CO2"
names = ["carbon dioxide"]
central = "C1"
summary = "Sixteen valence electrons: two C=O double bonds and two lone pairs on each oxygen. Carbon has two electron domains (the two double bonds) and no lone pairs, so the molecule is linear. Each C=O bond is polar (ΔEN 0.89), but the two bond dipoles point in exactly opposite directions along the linear axis and cancel — so CO2 has polar bonds yet is a nonpolar molecule. That is the lesson water inverts: shape decides."
source = "openstax-chemistry-2e"
polarity = "nonpolar"
polarity_reason = "The molecule is linear, so the two equal, opposite C=O bond dipoles cancel exactly — polar bonds, but no net molecular dipole."
