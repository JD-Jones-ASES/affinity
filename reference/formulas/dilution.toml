# Chemical Atlas formula entry (ADR-0039). Bare keys before [[array-of-tables]] headers (TOML trap #4).
id = "formula-dilution"
kind = "formula"
title = "Dilution"
name = "Dilution equation"
statement = "M_1 V_1 = M_2 V_2"
regime = "ledger-exact"
domain = "Diluting a solution with more solvent: the moles of solute are unchanged, only the volume grows. Not for mixing two different solutes."
summary = "Adding solvent does not add or remove solute — so the amount $M V$ (concentration times volume, an amount of moles) is the same before and after. Both sides of the equation carry the dimension of an amount, which is exactly the conserved quantity."
rearrangements = ["M_2 = \\dfrac{M_1 V_1}{V_2}", "V_2 = \\dfrac{M_1 V_1}{M_2}"]
related = [
  { to = "formula-molarity", type = "special-case-of" },
  { to = "conservation-of-mass", type = "see-also" },
]
lessons = []

[[variables]]
symbol = "M₁"
meaning = "initial concentration"
unit = "M"

[[variables]]
symbol = "V₁"
meaning = "initial volume"
unit = "L"

[[variables]]
symbol = "M₂"
meaning = "final concentration"
unit = "M"

[[variables]]
symbol = "V₂"
meaning = "final volume"
unit = "L"

[[terms]]
side = "lhs"
display = "M₁V₁"
factors = [ { var = "M₁", power = 1 }, { var = "V₁", power = 1 } ]

[[terms]]
side = "rhs"
display = "M₂V₂"
factors = [ { var = "M₂", power = 1 }, { var = "V₂", power = 1 } ]
