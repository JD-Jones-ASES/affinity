# Electrochemistry lesson, subtype `galvanic` (ADR-0050) — the electrochemistry tier opener: the species ledger
# with ELECTRONS as the tracked quantity. The Daniell cell: a zinc electrode in Zn2+ wired to a copper electrode
# in Cu2+. The producer assigns the roles from the sourced standard reduction potentials (the higher E° is the
# cathode), writes the two half-reactions, balances the electron ledger, and computes E°cell + ΔG° = −nFE°.
# TOML trap #4: every bare key precedes the [[assumptions]] / [misconception] headers.

id = "daniell-cell"
title = "Electrons for hire: the zinc–copper (Daniell) cell"
slug = "daniell-cell"
topic = "electrochemistry"
tags = ["electrochemistry", "galvanic cell", "redox", "cell potential", "oxidation numbers", "free energy"]

# the two half-cell couples, by their ion (sourced + machine-checked in data/reduction-potentials.toml). The
# producer decides which is the cathode (higher E°) and which the anode (lower E°) — the roles are not authored.
couples = ["Zn^2+", "Cu^2+"]

scenario = "Dip a strip of zinc into a zinc-sulfate solution and a strip of copper into a copper-sulfate solution, then connect the two metals with a wire and bridge the beakers with a salt bridge. A current flows — the cell does electrical work — and the reason is **redox**: one metal gives up electrons and the other takes them. This is the species ledger again, but now the quantity that moves is **electrons**. Which way do they go? Track the **oxidation numbers**: zinc goes from 0 in the metal to +2 in solution (it is **oxidized** — it loses electrons, at the *anode*), while copper(II) goes from +2 to 0 (it is **reduced** — it gains electrons, at the *cathode*). The two **standard reduction potentials** decide the direction and the voltage, and the free energy follows from $\\Delta G^\\circ = -nFE^\\circ$."

reference_links = ["oxidation-number", "half-reaction", "electron-ledger", "cell-potential", "standard-reduction-potential", "extent-of-reaction"]

author = "Affinity"
created = "2026-07-09"

# modeling assumptions — disclosed (ADR-0003, the model-assumed badge). The electron ledger + oxidation numbers are
# exact; the cell potential + free energy ride the standard-state idealization and the sourced E° table.
[[assumptions]]
claim = "Standard conditions: every dissolved species is at 1 M (unit activity), any gas at 1 bar, and the temperature is 25 °C. The tabulated $E^\\circ$ values — and so $E^\\circ_\\text{cell}$ and $\\Delta G^\\circ$ — hold only there; away from standard conditions the Nernst equation corrects the voltage."
kind = "model"

[[assumptions]]
claim = "The standard reduction potentials are measured against the standard hydrogen electrode (defined as exactly 0 V) — a sourced convention. Only differences $E^\\circ_\\text{cathode} - E^\\circ_\\text{anode}$ are physically meaningful (the zero point is arbitrary)."
kind = "rule"

# the canonical wrong move: assuming the direction of a redox reaction is a matter of how you write it, rather than
# fixed by the reduction potentials.
[misconception]
claim = "A cell reaction and its reverse are just two ways of writing the same thing, so the cell could run either direction — maybe the copper dissolves and the zinc plates out."
refuted_by = "reduction_potential_sets_direction"
