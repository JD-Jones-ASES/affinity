# The bonding tier's capstone — a MULTI-molecule comparison lesson (ADR-0047, the third lesson shape). It lines
# up three second-row hydrides of nearly identical mass (CH₄ 16, NH₃ 17, H₂O 18 g/mol) whose boiling points span
# −161 °C to +100 °C, so molecular SIZE is controlled and the intermolecular force is the only variable left. The
# machine-checked payoff: sorted by boiling point, the dominant intermolecular force is non-decreasing in
# strength (dispersion → hydrogen bonding) — ChemKernel refuses to emit if the corpus doesn't exhibit the trend.
# Each row's dominant IMF + boiling point is re-embedded from the verified `molecule` Atlas entry (no drift; the
# IMF is machine-derived from the structure, the boiling point sourced). Root keys precede any [table] header
# (TOML trap #4). Formula tokens use literal sub/superscripts, matching the molecule summaries.

id = "bonding-boiling-points-and-imfs"
title = "Same size, different boiling points: what intermolecular forces do"
slug = "boiling-points-and-imfs"
topic = "bonding"
tags = ["bonding", "intermolecular-forces", "hydrogen-bonding", "boiling-point", "polarity", "comparison"]
author = "Affinity"
created = "2026-07-08"

property = "boiling point"

# the molecules to compare (by Atlas id) — build.py resolves each verified entry and the builder sorts them by
# boiling point. Nearly equal masses, so size is controlled; the dominant IMF is the variable.
molecules = ["molecule-methane", "molecule-ammonia", "molecule-water"]

scenario = "Methane (CH₄), ammonia (NH₃), and water (H₂O) are almost exactly the same size — 16, 17, and 18 grams per mole, three atoms of the second row wrapped around hydrogens. Yet methane boils at −161 °C, ammonia at −33 °C, and water not until +100 °C. That is a spread of more than 250 degrees between molecules of the same mass. If size isn't doing it, what is? The answer is the force acting between the molecules — and it lines up exactly with the boiling point."

# the trend statement (the machine-verified claim: sorted by boiling point, the dominant IMF is non-decreasing)
trend = "Line the three up by boiling point and the dominant intermolecular force climbs right alongside it: methane (London dispersion only) at the bottom, then ammonia and water (both hydrogen bonding) far higher. Stronger forces between molecules take more energy to pull apart, so the substance boils higher."

takeaway = "Boiling doesn't break the bonds inside a molecule — it pulls whole molecules apart from each other, against their intermolecular forces. So the boiling point measures those forces, not the covalent bonds. With size held nearly constant, methane's weak London dispersion gives way at −161 °C, while water's strong hydrogen bonding holds on until 100 °C. Water tops even ammonia because it has two O–H donors and two lone-pair acceptors — twice the hydrogen bonding. (Size and polarizability matter too, which is why dispersion alone can add up for large molecules; here we held size fixed to isolate the force.)"

reference_links = ["intermolecular-forces", "molecule-water", "molecule-ammonia", "molecule-methane"]

[misconception]
claim = "Water boils at a high 100 °C because the O–H bonds holding the molecule together are strong — boiling has to break those bonds."
refuted_by = "intramolecular_vs_intermolecular"

[[assumptions]]
claim = "Boiling point is being used as a stand-in for intermolecular-force strength — a fair comparison only because the three molecules are nearly the same size, so differences in London dispersion (which grows with size) are small and the dominant force is what varies."
kind = "model"

[[assumptions]]
claim = "The dominant intermolecular force is ranked London dispersion < dipole–dipole < hydrogen bonding for molecules of similar size. This is the standard ordering; it can invert when sizes differ a lot, since dispersion grows with molecular size and polarizability."
kind = "model"
