# A second precipitation slice (brief §16 shape), authored human layer only — ChemKernel derives and verifies
# the rest. This one stresses NON-UNIT stoichiometry: the net ionic is 3 Ca2+ + 2 PO4^3- -> Ca3(PO4)2, so the
# limiting reagent is decided by moles ÷ coefficient, not by raw moles. At the defaults CaCl2 has MORE moles of
# its reacting ion (3.00 mmol Ca2+) than Na3PO4 has (2.50 mmol PO4^3-), yet CaCl2 still limits — 3.00/3 < 2.50/2.
# That is the misconception this lesson exists to break. Numbers are strings to stay exact (ADR-0013).
#
# Root keys must precede any [table]/[[array]] header, or TOML absorbs them into the preceding table (trap #4).

id = "precipitation-calcium-phosphate-limiting"
title = "Which reactant runs out when the coefficients aren't 1-to-1?"
slug = "calcium-phosphate-limiting"
topic = "precipitation"
tags = ["solutions", "stoichiometry", "limiting-reagent", "precipitation", "polyatomic-ion"]
author = "Affinity"
created = "2026-07-05"
scenario = "30.0 mL of 0.100 M CaCl2(aq) is mixed with 25.0 mL of 0.100 M Na3PO4(aq). A white precipitate of calcium phosphate forms. What mass of Ca3(PO4)2 forms, which reactant limits the reaction, and which ions are left in solution? Watch the coefficients: the balanced reaction consumes calcium and phosphate in a 3-to-2 ratio, so more moles does not mean more room to react."

reactants = ["CaCl2(aq)", "Na3PO4(aq)"]
products = ["Ca3(PO4)2(s)", "NaCl(aq)"]

reference_links = ["stoichiometry", "limiting-reagent", "extent-of-reaction", "molarity", "molar-mass", "net-ionic-equation", "precipitation", "solubility-rules", "dissociation", "spectator-ion", "polyatomic-ion", "conservation-of-mass", "balancing-equations", "calcium", "phosphate"]

