# Normal boiling points (°C at 1 atm) — a sourced empirical dataset (ADR-0006/0046) for the intermolecular-forces
# concept. IMF strength shows up in the boiling point: the stronger the dominant force between molecules, the more
# thermal energy it takes to pull them apart into a gas. The canonical teaching comparison is the small hydrides of
# similar mass — CH₄ (dispersion only) ≪ NH₃ (hydrogen bonding) ≪ H₂O (hydrogen bonding, two donors + two acceptors)
# — which OpenStax *Chemistry 2e* §10.1 uses directly. A boiling point is a MEASURED, rounded value (regime-3),
# carried under the data/rule-sourced badge, never dressed up as exact. Some substances have no liquid at 1 atm and
# SUBLIME instead (CO₂ at −78.5 °C) — labeled honestly with `phase_change`. Keyed by phase-less formula; read as
# Decimal (ADR-0013). The bare `source` key precedes the [substances] tables (TOML trap #4).
source = "openstax-chemistry-2e"

[substances.H2O]
name = "water"
temperature_c = "100.0"
phase_change = "boiling"

[substances.NH3]
name = "ammonia"
temperature_c = "-33.3"
phase_change = "boiling"

[substances.CH4]
name = "methane"
temperature_c = "-161.5"
phase_change = "boiling"

# CO₂ has no liquid phase at 1 atm — it sublimes (solid → gas directly) at −78.5 °C. Its very low value is the
# point: a nonpolar molecule held only by weak London dispersion barely condenses at all.
[substances.CO2]
name = "carbon dioxide"
temperature_c = "-78.5"
phase_change = "sublimation"
