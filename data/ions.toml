# Curated ion dataset (ADR-0006, ADR-0012). Common monatomic + polyatomic ions.
#
# Ion charges are conventional teaching facts (regime 3) — source `openstax-chemistry-2e` (CC BY 4.0),
# see docs/SOURCES.md. The `formula` field is the composition only (no charge); `charge` is the sourced
# datum. data.py verifies at load that every formula parses and is built from elements in elements.toml,
# so the composition of each ion is machine-checked even though the charge is sourced.
#
# `compound_name` (ADR-0027) is the name the ion contributes inside an ionic compound — the element name for
# fixed-charge cations (`sodium`), element name + Stock Roman numeral for variable-charge metals
# (`iron(III)`), and the -ide/-ate/-ite name for anions (`chloride`, `sulfate`). It is a sourced naming
# convention (same source as the charges); the *formula* the two ions assemble into is machine-verified by
# charge crossover (chemkernel.reference.assemble_formula).
#
# Table keys are the species id in the house caret charge form (house-conventions §Notation), quoted
# because `^`/`+` are not TOML bare-key characters.

charge_source = "openstax-chemistry-2e"

# --- monatomic cations (element links back to elements.toml) ---

[ions."H^+"]
formula = "H"
charge = 1
name = "hydrogen ion"
compound_name = "hydrogen"
kind = "monatomic"
element = "H"

[ions."Na^+"]
formula = "Na"
charge = 1
name = "sodium ion"
compound_name = "sodium"
kind = "monatomic"
element = "Na"

[ions."K^+"]
