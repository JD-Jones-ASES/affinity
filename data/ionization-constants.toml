# Ionization constants (ADR-0006, ADR-0048). Regime-3 sourced data — the equilibrium tier's dataset, the
# counterpart of formation-enthalpies.toml for thermochemistry. Three kinds of ionization equilibrium constant
# live here (all pure numbers — activities referenced to the 1 M standard state):
#
#   • Kₐ — a weak monoprotic ACID's ionization  HA(aq) <=> H+(aq) + A-(aq),  Kₐ = [H+][A-] / [HA].
#   • K_b — a weak molecular BASE's ionization  B(aq) + H2O(l) <=> BH+(aq) + OH-(aq),  K_b = [BH+][OH-] / [B]
#     (water is the pure solvent, activity 1 — it does NOT appear in K_b; the load-bearing exclusion, like the
#     pure solid in a Ksp, ADR-0048).
#   • K_w — water's own autoionization  2 H2O(l) <=> H3O+(aq) + OH-(aq),  K_w = [H+][OH-] = 1.0×10⁻¹⁴ at 25 °C.
#     The bridge between acids and bases: pH + pOH = pK_w = 14.00, so a base's [OH-] fixes its pH.
#
# A SMALL Kₐ/K_b means the equilibrium lies far to the left: only a little ionizes. Values are the standard
# 25 °C data, source `openstax-chemistry-2e` — Appendix H (weak acids), Appendix I (weak bases), §14.1 (K_w),
# CC BY 4.0 — see docs/SOURCES.md.
#
# Read as Decimal (never float — ADR-0013). Acid keys are the neutral acid formula (house ASCII), matching
# data/acids-bases.toml (the acid's proton count + conjugate anion are curated there; this file adds the
# QUANTITATIVE constant). Base keys are the neutral base formula; its `conjugate_acid` (the cation formed when
# it gains a proton) must be in the ion table, and data.py machine-checks base + H⁺ = conjugate_acid on load
# (regime-1 — so "NH3 + H⁺ is NH4⁺" is verified even though "NH3 is a weak base" is a sourced convention). The
# ICE accounting the equilibrium engine builds on top of these constants is machine-checked (ADR-0048).
#
# The [acids]/[bases] tables are MONOPROTIC weak acids / MONOBASIC weak bases. Polyprotic acids (H3PO4:
# Kₐ1/Kₐ2/Kₐ3) ionize in stages and live in the [polyprotic] table below — each stage a separate Kₐ, solved in
# sequence (ADR-0048).

source = "openstax-chemistry-2e"

# --- water autoionization: the acid/base bridge (K_w = [H+][OH-]) ---
[water]
name = "ion-product constant of water"
kw = "1.0e-14"

# --- weak acids (Kₐ): HA <=> H+ + A- ---
[acids."HC2H3O2"]      # acetic acid — the canonical first weak acid; conjugate base acetate is in the ion table
name = "acetic acid"
ka = "1.8e-5"

[acids."HCHO2"]        # formic acid (methanoic acid); conjugate base formate
name = "formic acid"
ka = "1.8e-4"

[acids."HClO"]         # hypochlorous acid; conjugate base hypochlorite
name = "hypochlorous acid"
ka = "2.9e-8"

[acids."HCN"]          # hydrocyanic acid — a very weak acid (Kₐ ~ 10⁻¹⁰); conjugate base cyanide
name = "hydrocyanic acid"
ka = "4.9e-10"

# --- weak bases (K_b): B + H2O <=> BH+ + OH- ; conjugate_acid is the cation formed, machine-checked on load ---
[bases."NH3"]          # ammonia — the canonical first weak base; conjugate acid ammonium (NH4+) is in the ion table
name = "ammonia"
kb = "1.8e-5"
conjugate_acid = "NH4^+"

# --- polyprotic weak acids: staged ionization, Kₐ1 ≫ Kₐ2 ≫ Kₐ3 (each stage HₙA <=> H+ + Hₙ₋₁A) ---
# Because each successive Kₐ is ~10⁵ smaller, the first ionization sets [H+] almost entirely and each stage is
# solved on the previous stage's equilibrium (the standard successive treatment — a disclosed model assumption).
# On load, data.py machine-checks each stage's composition: the acid = its conjugate anion + one H+, charge down by
# one (regime-1 — so "H2PO4⁻ loses a proton to give HPO4²⁻" is verified). Source Appendix H (`openstax-chemistry-2e`).
[polyprotic."H3PO4"]
name = "phosphoric acid"
stages = [
  { acid = "H3PO4", ka = "7.5e-3", anion = "H2PO4^-" },      # Kₐ1
  { acid = "H2PO4^-", ka = "6.2e-8", anion = "HPO4^2-" },    # Kₐ2
  { acid = "HPO4^2-", ka = "4.2e-13", anion = "PO4^3-" },    # Kₐ3
]
