# Curated element dataset (ADR-0006, ADR-0012, ADR-0031). ChemKernel reads empirical constants ONLY from here.
#
# ── Atomic weights ────────────────────────────────────────────────────────────────────────────────────
# IUPAC/CIAAW *abridged* standard atomic weights (Atomic Weights 2021 report, table rev. 2024) — SOURCES id
# `ciaaw-2021-atomic-weights`. The values are scientific facts (not copyrightable); CIAAW is cited as the
# authority + access date. Stored as strings, read as Decimal so precision/sig-figs survive and no float ever
# enters the pipeline (ADR-0013). Interval elements (Li, B, Si, S, Ar, …) carry the abridged single value with
# no conventional uncertainty — `uncertainty` is omitted, exactly as for N/P before.
#
# ── Positions ─────────────────────────────────────────────────────────────────────────────────────────
# group/period/block are the definitional IUPAC periodic-table positions — source `iupac-periodic-table`.
#
# ── Periodic properties (ADR-0031, Phase 1 item 5a) ─────────────────────────────────────────────────────
# electronegativity        Pauling scale — source `openstax-chemistry-2e` (Fig 7.6). Undefined for the noble
#                          gases (He, Ne, Ar): omitted, never written as 0.
# covalent_radius_pm       single-bond covalent radius (Cordero et al., Dalton Trans. 2008) — source
#                          `cordero-2008-covalent-radii`. Main-group Z ≤ 20 only; the transition metals
#                          (Fe, Cu, Zn) have spin-state-dependent radii and are omitted this pass (a later
#                          transition-metal radius session curates them with the spin state disclosed).
# first_ionization_kj_mol  first ionization energy (NIST atomic data, public domain) — source
#                          `nist-ionization-energies`.
# All three are OPTIONAL per element, stored as strings → Decimal (never float, ADR-0013), and cross-checked
# against the independent `mendeleev` oracle in tests/test_oracle.py (ADR-0026). Every source id resolves in
# docs/SOURCES.md; the validate-reference gate fails on any that does not.
#
# ── Element set ─────────────────────────────────────────────────────────────────────────────────────────
# The first twenty elements (H…Ca — periods 1–3 complete, period 4 opened) plus the three transition metals
# the nomenclature engine introduced (Fe, Cu, Zn). This spans the clean periodic trends the Valence-Table
# flagship teaches: period 2 (Li→Ne) and period 3 (Na→Ar) left-to-right, and groups 1 (H/Li/Na/K),
# 2 (Be/Mg/Ca), 17 (F/Cl), 18 (He/Ne/Ar) top-to-bottom. Every ion in ions.toml stays composed of elements
# present here (the load-time self-check in data.py depends on it).

source = "ciaaw-2021-atomic-weights"
position_source = "iupac-periodic-table"
electronegativity_source = "openstax-chemistry-2e"
covalent_radius_source = "cordero-2008-covalent-radii"
ionization_energy_source = "nist-ionization-energies"

