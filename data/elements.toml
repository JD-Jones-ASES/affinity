# Curated element dataset (ADR-0006, ADR-0012, ADR-0031, ADR-0052). ChemKernel reads empirical constants ONLY from here.
# The full 118-element periodic table (ADR-0052): "depth for the common elements, breadth for the rest" — the
# original curated 23 (H-Ca, Fe, Cu, Zn) keep their ions/salts/lessons; every other element carries honest
# breadth (placement + identity + sourced properties where an authority confidently defines one).
#
# ── Atomic weights ────────────────────────────────────────────────────────────────────────────────────
# IUPAC/CIAAW *abridged* standard atomic weights (Atomic Weights 2021 report, table rev. 2024) — SOURCES id
# `ciaaw-2021-atomic-weights`. Stored as strings, read as Decimal so precision/sig-figs survive and no float
# ever enters the pipeline (ADR-0013). Each element with a standard weight carries the abridged `uncertainty`
# (the abridged single value + its abridged uncertainty; e.g. Li 6.94 ± 0.06, Ar 39.95 ± 0.16). `uncertainty`
# is provenance metadata, unused in any calculation.
#
# ── No standard atomic weight (ADR-0052) ────────────────────────────────────────────────────────────────
# The radioactive elements with no CIAAW standard atomic weight (Tc, Pm, Po, At, Rn, Fr, Ra, Ac, and every
# Z >= 93) carry NO `atomic_weight`; instead they carry `mass_number` — the mass number of the longest-lived
# isotope, from the IUPAC periodic table (source `iupac-periodic-table`), the IUPAC bracket convention. It is
# a distinct integer field that NEVER enters arithmetic (data.py refuses to Decimal() it); the valence-table
# builder emits the bracketed display form "[98]". Exactly one of `atomic_weight` / `mass_number` per element.
# (The superheavy "longest-lived isotope" is genuinely source/date-dependent; the value is display provenance.)
#
# ── Positions ─────────────────────────────────────────────────────────────────────────────────────────
# group/period/block are the definitional IUPAC positions — source `iupac-periodic-table`. f-block convention:
# La (57) and Ac (89) are group 3, block "d"; the fourteen f-block elements Ce-Lu (58-71) and Th-Lr (90-103)
# carry `block = "f"` and NO `group` (the schema makes `group` optional only for the f-block). This matches
# the mendeleev oracle's convention, so group/period/block are all independently cross-checked (ADR-0026).
#
# ── Periodic properties (ADR-0031, ADR-0052) ────────────────────────────────────────────────────────────
# electronegativity        revised-Pauling scale (Allred 1961 / CRC two-decimal) — source
#                          `allred-1961-electronegativity`. Shipped for 71 elements. OMITTED where undefined
#                          or unconfirmable: the noble gases (undefined on the Pauling scale), the lanthanides
#                          the oracle cannot confirm (Pm, Eu, Tb, Yb), Np and every Z >= 95, AND ten heavy
#                          metals (Tc, Lu, W, Pt, Au, Hg, Tl, Pb, Bi, U) where the Allred-revised value and the
#                          independent mendeleev cross-check diverge by > 0.06 (the Pauling scale for heavy
#                          metals is compilation-dependent) — a gap is honest; we never ship a disputed value.
# covalent_radius_pm       single-bond covalent radius (Cordero et al., Dalton Trans. 2008) — source
#                          `cordero-2008-covalent-radii`. Main-group Z <= 20 only (unchanged this wave); the
#                          transition metals have spin-state-dependent radii and stay omitted.
# first_ionization_kj_mol  first ionization energy (NIST ASD, public domain) — source `nist-ionization-energies`.
#                          Shipped for Z 1-103 (measured/recommended). The transactinides (Z >= 104) are omitted
#                          — their ionization energies are theoretical estimates, not confidently measured.
# All are OPTIONAL per element, stored as strings -> Decimal (never float, ADR-0013), and cross-checked against
# the independent `mendeleev` oracle in tests/test_oracle.py (ADR-0026): atomic weight vs `periodictable`;
# name/group/period/block, EN, and ionization energy vs `mendeleev`. Every source id resolves in docs/SOURCES.md.

source = "ciaaw-2021-atomic-weights"
position_source = "iupac-periodic-table"
electronegativity_source = "allred-1961-electronegativity"
covalent_radius_source = "cordero-2008-covalent-radii"
ionization_energy_source = "nist-ionization-energies"

