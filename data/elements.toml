# Curated element dataset (ADR-0006, ADR-0012). ChemKernel reads empirical constants ONLY from here.
#
# Atomic weights are the IUPAC/CIAAW *abridged* standard atomic weights (Atomic Weights 2021 report,
# table revised 2024) — see docs/SOURCES.md id `ciaaw-2021-atomic-weights`. The values are scientific
# facts (not copyrightable); CIAAW is cited as the authority + access date. Stored as strings and read as
# Decimal so precision/sig-figs survive and no float ever enters the pipeline (ADR-0013).
#
# Group/period/block are the definitional IUPAC periodic-table positions — source `iupac-periodic-table`.
#
# N, S, P are included beyond the six Phase-0 elements so every ion in ions.toml is composed of known
# elements (the load-time self-check in data.py depends on this). K, Mg, Al, Fe, Cu, Zn were added for the
# nomenclature engine (Phase 1 item 2) — Fe and Cu carry variable charges (the Stock system). Every added
# weight is cross-checked against the `periodictable` oracle in tests/test_oracle.py (ADR-0026).

source = "ciaaw-2021-atomic-weights"
position_source = "iupac-periodic-table"

[elements.H]
